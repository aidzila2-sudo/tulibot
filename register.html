<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceScript + Sign Language AI - Daftar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14C14.2091 14 16 12.2091 16 10V6C16 3.79086 14.2091 2 12 2C9.79086 2 8 3.79086 8 6V10C8 12.2091 9.79086 14 12 14Z" stroke="#7c6dfa" stroke-width="2"/>
                        <path d="M19 10V11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11V10" stroke="#7c6dfa" stroke-width="2"/>
                        <path d="M12 18V22" stroke="#7c6dfa" stroke-width="2"/>
                        <path d="M8 22H16" stroke="#7c6dfa" stroke-width="2"/>
                    </svg>
                    <h1>VoiceScript + Sign Language AI</h1>
                </div>
                <p class="tagline">Daftar akun baru untuk memulai</p>
            </div>
            
            <form id="registerForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Masukkan username">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Masukkan email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Masukkan password">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Konfirmasi Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Konfirmasi password">
                </div>
                
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>
                
                <button type="submit" class="btn-primary">Daftar</button>
            </form>
            
            <div class="divider">
                <span>Atau daftar dengan</span>
            </div>
            
            <button class="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C17.523 22 22 17.523 22 12S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z" stroke="#4285F4" stroke-width="1.5"/>
                    <path d="M12 6.5c1.8 0 3.3.7 4.5 1.9L18 6c-1.7-1.5-3.9-2.4-6-2.4-3.6 0-6.6 2.2-7.7 5.2l2 1.4C6.9 8 9.2 6.5 12 6.5Z" fill="#EA4335"/>
                    <path d="M21.3 12.2c0-.8-.1-1.5-.3-2.2H12v4.4h5.2c-.2 1.3-1 2.4-2.1 3.1l1.7 1.3c1.4-1.3 2.5-3.3 2.5-6.6Z" fill="#4285F4"/>
                    <path d="M4.3 14.5c-.8-1.3-.8-3 0-4.3l-2-1.4C.6 10.5 0 11.2 0 12s.6 1.5 1.6 2.1l2-1.6Z" fill="#FBBC05"/>
                    <path d="M12 19.5c2.8 0 5.2-.9 7-2.5l-1.7-1.3c-1.2.9-2.8 1.4-4.3 1.4-2.8 0-5.1-1.5-6.1-3.8l-2 1.4C6.3 17.3 8.9 19.5 12 19.5Z" fill="#34A853"/>
                </svg>
                Daftar dengan Google
            </button>
            
            <div class="login-footer">
                <p>Sudah punya akun? <a href="login.html">Login disini</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            if (password !== confirm_password) {
                errorEl.textContent = 'Password dan konfirmasi password tidak sesuai!';
                errorEl.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Password harus minimal 6 karakter!';
                errorEl.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('../backend/api/register_process.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successEl.textContent = data.message;
                    successEl.style.display = 'block';
                    // Redirect to verify page after a delay
                    setTimeout(() => {
                        window.location.href = 'verify.html?email=' + encodeURIComponent(email);
                    }, 2000);
                } else {
                    errorEl.textContent = data.message;
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Terjadi kesalahan pada server!';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
